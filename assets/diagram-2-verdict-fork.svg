<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Evidence forks into confirmed or refused verdicts; a failed control voids everything and not-reproducible needs 228 clean runs.">
  <rect x="0" y="0" width="760" height="340" rx="10" fill="#faf8f3"/>
  <rect x="0.5" y="0.5" width="759" height="339" rx="10" fill="none" stroke="#e5dfd2" stroke-width="1"/>

  <text x="28" y="38" font-size="20" font-weight="700" fill="#23201a">The verdict forks — and refuses.</text>
  <text x="28" y="58" font-size="12.5" fill="#6e675a">The happy paths are easy. The refusals are the discipline.</text>

  <!-- legend -->
  <rect x="560" y="30" width="11" height="11" rx="2" fill="#e7efe9" stroke="#6fa483"/>
  <text x="576" y="40" font-size="11" fill="#6e675a">confirmed</text>
  <rect x="652" y="30" width="11" height="11" rx="2" fill="#f7e9e6" stroke="#c98a7a"/>
  <text x="668" y="40" font-size="11" fill="#6e675a">refusal</text>

  <!-- entry -->
  <rect x="28" y="150" width="132" height="48" rx="8" fill="#eef1f4" stroke="#aab4bf"/>
  <text x="94" y="172" text-anchor="middle" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#23201a">evidence</text>
  <text x="94" y="188" text-anchor="middle" font-size="10" fill="#6e675a">N attempts + control</text>

  <!-- control gate -->
  <line x1="160" y1="174" x2="196" y2="174" stroke="#8a8577" stroke-width="1.5"/><path d="M196,174 l-9,-4 l0,8 z" fill="#8a8577"/>
  <path d="M240 150 L280 174 L240 198 L200 174 Z" fill="#f7e9e6" stroke="#c98a7a"/>
  <text x="240" y="178" text-anchor="middle" font-size="10.5" fill="#6e675a">control</text>
  <text x="240" y="140" text-anchor="middle" font-size="10" fill="#8a8577">harness blind?</text>

  <!-- control fail -> up -->
  <line x1="240" y1="150" x2="240" y2="112" stroke="#c98a7a" stroke-width="1.5"/><path d="M240,112 l-4,9 l8,0 z" fill="#c98a7a"/>
  <rect x="150" y="78" width="196" height="30" rx="7" fill="#f7e9e6" stroke="#c98a7a"/>
  <text x="163" y="98" font-size="11.5" font-weight="700" fill="#a5533f">INCONCLUSIVE — blind</text>

  <!-- control pass -> count -->
  <line x1="280" y1="174" x2="320" y2="174" stroke="#8a8577" stroke-width="1.5"/><path d="M320,174 l-9,-4 l0,8 z" fill="#8a8577"/>
  <rect x="320" y="150" width="120" height="48" rx="8" fill="#eef1f4" stroke="#aab4bf"/>
  <text x="380" y="172" text-anchor="middle" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#23201a">how many hits?</text>
  <text x="380" y="188" text-anchor="middle" font-size="10" fill="#6e675a">H of N valid</text>

  <!-- all hit -> STABLE -->
  <line x1="440" y1="162" x2="596" y2="120" stroke="#6fa483" stroke-width="1.5"/><path d="M596,120 l-9,-1 l3,8 z" fill="#6fa483"/>
  <rect x="596" y="104" width="150" height="30" rx="7" fill="#e7efe9" stroke="#6fa483"/>
  <text x="609" y="124" font-size="11.5" font-weight="700" fill="#3f7a55">CONFIRMED · STABLE</text>

  <!-- some hit -> FLAKY -->
  <line x1="440" y1="174" x2="596" y2="174" stroke="#6fa483" stroke-width="1.5"/><path d="M596,174 l-9,-4 l0,8 z" fill="#6fa483"/>
  <rect x="596" y="159" width="150" height="30" rx="7" fill="#e7efe9" stroke="#6fa483"/>
  <text x="609" y="179" font-size="11.5" font-weight="700" fill="#3f7a55">CONFIRMED · FLAKY</text>

  <!-- zero hit -> 228 bar -->
  <line x1="440" y1="186" x2="576" y2="230" stroke="#8a8577" stroke-width="1.5"/><path d="M576,230 l-9,-1 l3,-8 z" fill="#8a8577"/>
  <rect x="556" y="216" width="190" height="52" rx="8" fill="#f7e9e6" stroke="#c98a7a"/>
  <text x="569" y="236" font-size="11.5" font-weight="700" fill="#a5533f">zero hits — not enough</text>
  <text x="569" y="253" font-size="10.5" fill="#6e675a">need <tspan font-family="ui-monospace, Menlo, monospace" fill="#a5533f">228</tspan> clean runs for NOT_REPRO</text>

  <!-- bottom callout -->
  <rect x="28" y="290" width="718" height="34" rx="8" fill="#fbf6ee" stroke="#c98a7a"/>
  <text x="44" y="312" font-size="13" font-weight="700" fill="#23201a">“Ran it once, didn’t see it” is 228× short of the bar.<tspan font-weight="400" fill="#6e675a">  A failed control voids every “absent”.</tspan></text>
</svg>
